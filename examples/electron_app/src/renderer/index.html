<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents Reader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Documents Reader</h1>
        <p class="subtitle">Selecione ou arraste PDFs, escolha o tipo, e rode o pipeline.</p>
        <p id="projectRoot" class="subtitle" style="margin-top:8px"></p>
        <p id="codexAuthStatus" class="subtitle" style="margin-top:4px"></p>
      </div>
      <div class="actions">
        <label class="engine-control" for="flowMode">
          <span>Modo</span>
          <select id="flowMode" class="engine-select">
            <option value="importation">Importation</option>
            <option value="exportation">Exportation</option>
          </select>
        </label>
        <label class="engine-control" for="stage2Engine">
          <span>Stage 02</span>
          <select id="stage2Engine" class="engine-select">
            <option value="regex">Regex</option>
            <option value="llm">LLM (Codex)</option>
          </select>
        </label>
        <button id="btnCodexConnect" class="btn">Conectar Codex</button>
        <button id="btnCodexLogout" class="btn">Desconectar</button>
        <button id="btnPick" class="btn">Selecionar PDFs</button>
        <button id="btnRun" class="btn btn-primary" disabled>Run</button>
      </div>
    </header>

    <main class="main">
      <section class="card">
        <button id="dropzone" class="dropzone" type="button">
          <div class="dropzone-title">Arraste & solte os PDFs aqui</div>
          <div class="dropzone-hint">ou clique aqui para selecionar</div>
        </button>

        <div class="list-header">
          <div>Arquivos</div>
          <div id="docTypeLegend" class="muted">Tipo do documento</div>
        </div>

        <div id="fileList" class="file-list"></div>
      </section>

      <section class="card">
        <div class="log-header">
          <div>
            <div class="label">Logs</div>
            <div id="status" class="muted">Pronto.</div>
            <div id="progressWrap" class="progress-wrap">
              <div class="progress-row">
                <span id="progressLabel" class="muted">Progresso: aguardando execucao</span>
                <span id="progressPct" class="muted">0%</span>
              </div>
              <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
              </div>
            </div>
            <div id="reportPath" class="muted report-path" style="display:none"></div>
          </div>
          <div>
            <button id="btnOpenReport" class="btn" disabled>Abrir Report (Stage 4)</button>
          </div>
        </div>
        <pre id="log" class="log"></pre>
        <div class="log-footer">
          <button id="btnOpenDetailedReport" class="btn" disabled>Abrir Report Detalhado (Stage 5)</button>
        </div>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
